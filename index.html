<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo Payment</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 350px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* Header MoMo */
.header {
    background: #d82d8b;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 20px;
    font-weight: bold;
}

/* List */
.list {
    padding: 20px;
}

/* Item */
.item {
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid #eee;
    cursor: pointer;
    transition: 0.3s;
    font-size: 16px;
    text-align: center;
}

/* Hover */
.item:hover {
    background: #ffe6f2;
    border-color: #d82d8b;
    color: #d82d8b;
    transform: scale(1.03);
}

/* Highlight */
.item.hot {
    background: #fff0f6;
    border: 2px solid #d82d8b;
    color: #d82d8b;
    font-weight: bold;
}

/* Loading */
.loading {
    text-align: center;
    padding: 15px;
    color: #999;
}
</style>

</head>

<body>

<div class="container">
    <div class="header">💳 Thanh toán MoMo</div>

    <div class="list">
         <div class="item" onclick="sendTiki('1559583')">200.000 VNĐ</div>
         <div class="item" onclick="sendTiki('7321981')">300.000 VNĐ</div>
         <div class="item" onclick="sendTiki('1559587')">500.000 VNĐ</div>
         <div class="item" onclick="sendTiki('9672466')">800.000 VNĐ</div>
        <div class="item" onclick="sendTiki('1559591')">1.000.000 VNĐ</div>
        <div class="item" onclick="sendTiki('24376737')">1.500.000 VNĐ</div>
        <div class="item" onclick="sendTiki('1559595')">2.000.000 VNĐ</div>
        <div class="item" onclick="sendTiki('2648647')">3.000.000 VNĐ</div>
        <div class="item" onclick="sendTiki('24382189')">4.000.000 VNĐ</div>
        <div class="item" onclick="sendTiki('1559603')">5.000.000 VNĐ</div>

        <div class="item hot" onclick="sendTiki('7322125')">
            ⭐ 10.000.000 VNĐ (HOT)
        </div>

        <div id="loading" class="loading"></div>
    </div>
</div>

<script>
async function sendTiki(product_id) {
    const loading = document.getElementById("loading");
    loading.innerHTML = "⏳ Đang chuyển sang thanh toán...";

    try {
        const res = await fetch("https://vannghimomo.onrender.com/tiki-create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                product_id: product_id,
                qty: 1
            })
        });

        const data = await res.json();
        console.log(data);

        const redirectUrl =
            data?.tikiData?.redirect_url ||
            data?.data?.redirect_url ||
            data?.redirect_url;

        if (redirectUrl) {
            window.location.href = redirectUrl;
        } else {
            loading.innerHTML = "❌ Không lấy được link thanh toán";
        }

    } catch (err) {
        loading.innerHTML = "❌ Lỗi kết nối server";
        console.error(err);
    }
}
</script>

</body>
</html>
